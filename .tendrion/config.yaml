version: 2
tdd: strict
profile: quality
models:
  planning_main: opus
  planning_review: codex
  implementation_main: opus
  implementation_review: codex
  verification_main: sonnet
  verification_review: codex
  debugging_main: opus
  debugging_review: sonnet
review:
  max_rounds: 2
  skip_trivial: true
embedded:
  mode: disabled
  threshold: 2
parallelization: true
commit_docs: true
test_commands:
  - cargo test
  - cargo nextest run
