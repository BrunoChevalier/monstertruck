# Tendrion Configuration
version: 2

# TDD enforcement level
tdd: strict  # strict | guided | off

# Profile selects model assignments
# Override individual roles below
profile: quality  # quality | balanced | budget

# Model role assignments
# Each AI workflow step has main + review model
models:
  planning_main: opus
  planning_review: codex
  implementation_main: opus
  implementation_review: codex
  verification_main: sonnet
  verification_review: codex
  debugging_main: opus
  debugging_review: sonnet

# Review settings
review:
  max_rounds: 2  # positive integer
  skip_trivial: true  # true | false

# Embedded systems mode
embedded:
  mode: disabled  # auto | enabled | disabled
  threshold: 2  # positive integer, min 1

# Execution settings
parallelization: true  # true | false
commit_docs: true  # true | false
